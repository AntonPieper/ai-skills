name: Android Development Smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "COPILOT_GITHUB_TOKEN is not set; skipping android-development smoke." >> "$GITHUB_STEP_SUMMARY"
          fi

  smoke:
    needs: preflight
    if: ${{ needs.preflight.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      REPOS: termux,cleanarchitecture
      SCENARIOS: discovery,tasks,modernization,ui-triage
      JOBS: '2'
      RUN_ROOT: /tmp/android-development-smoke/run-${{ github.run_id }}-${{ github.run_attempt }}
      TIMEOUT_SECONDS: '240'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run smoke matrix
        run: ./validation/android-development/smoke.sh

      - name: Render smoke report
        if: always()
        run: node ./scripts/render-android-smoke-report.mjs "$RUN_ROOT"

      - name: Upload smoke summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-development-smoke
          path: |
            ${{ env.RUN_ROOT }}/summary.tsv
            ${{ env.RUN_ROOT }}/skill-package.txt
            ${{ env.RUN_ROOT }}/logs/*.log
            ${{ env.RUN_ROOT }}/report/**
